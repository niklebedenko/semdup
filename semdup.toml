# Dogfood config: semdup scanning its own source. CI runs `scan` (advisory)
# on every push and `diff --check` on PRs; see .github/workflows/ci.yml.
# The eval pipeline is unaffected — it passes --root/--db explicitly.

[extract]
roots = ["src", "scripts", "sidecar"]
granularity = ["function"]
# The CI smoke plant is a deliberate clone of c_function_name; keep it out
# of the diff gate (the smoke test copies it into src/ to be found).
exclude = ["/.github/"]

# No [embed] section: the default hosted model (nomic-ai/CodeRankEmbed@fast)
# is auto-downloaded into the user cache on first use, both locally and in CI.

[scan]
# Swept on this repo after function/block granularity changes: 0.85 keeps the
# dogfood gate focused on close clones instead of shared scanner/extractor plumbing.
threshold = 0.85
min_lines = 8
skip_tests = true
