version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    groups:
      # tree-sitter grammars move in lockstep; one PR for all of them
      tree-sitter:
        patterns:
          - "tree-sitter*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
