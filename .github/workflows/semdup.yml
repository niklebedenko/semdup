name: semdup

on:
  workflow_call:
    inputs:
      mode:
        type: string
        default: auto
      policy:
        type: string
        default: new-pairs
      threshold:
        type: string
        default: auto
      min-lines:
        type: string
        default: auto
      skip-tests:
        type: string
        default: "true"
      roots:
        type: string
        default: ""
      exclude:
        type: string
        default: ""
      model:
        type: string
        default: ""
      backend:
        type: string
        default: ""
      provider:
        type: string
        default: auto
      features:
        type: string
        default: default
      cache:
        type: string
        default: "true"

permissions:
  contents: read

jobs:
  semdup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: niklebedenko/semdup@v1
        with:
          checkout: "false"
          cache: ${{ inputs.cache }}
          mode: ${{ inputs.mode }}
          policy: ${{ inputs.policy }}
          threshold: ${{ inputs.threshold }}
          min-lines: ${{ inputs.min-lines }}
          skip-tests: ${{ inputs.skip-tests }}
          base-ref: ${{ github.base_ref }}
          roots: ${{ inputs.roots }}
          exclude: ${{ inputs.exclude }}
          model: ${{ inputs.model }}
          backend: ${{ inputs.backend }}
          provider: ${{ inputs.provider }}
          features: ${{ inputs.features }}
