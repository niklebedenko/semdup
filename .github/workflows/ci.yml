name: CI
on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      # The default feature set pulls ONNX Runtime; make sure the slim build works too.
      - run: cargo check --no-default-features

  # Dogfood: semdup on semdup's own source (~80 units), using the hosted
  # model export — no python, no eval corpus. The full recall eval against
  # the pinned public corpora lives in eval.yml (scheduled + path-triggered):
  # embedding its 26k units on a CPU runner is far too slow for the PR path.
  dogfood:
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DOGFOOD_THRESHOLD: "0.85"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release

      # The hosted model download is blake3-verified by semdup itself, so a
      # stale cache entry can never go undetected. Key on the release tag.
      - name: Cache model
        uses: actions/cache@v4
        with:
          path: ~/.cache/semdup
          key: hosted-model-coderankembed-fast-1
      # Embeddings are cached by (model, content hash): with a restored DB
      # only functions touched since the last run re-embed.
      - name: Cache embedding DB
        uses: actions/cache@v4
        with:
          path: dogfood.sqlite
          key: dogfood-db-v2-${{ github.run_id }}
          restore-keys: dogfood-db-v2-

      # scan auto-refreshes (extract + embed) from semdup.toml roots, and
      # downloads the model on a cold cache. Advisory: exit code is 0.
      - name: Scan own source (advisory)
        run: |
          set -o pipefail
          target/release/semdup --db dogfood.sqlite scan \
            --threshold "$DOGFOOD_THRESHOLD" \
            | tee -a "$GITHUB_STEP_SUMMARY"

      # Self-contained end-to-end check: pretend a PR adds a rename-only
      # clone of extract.rs's c_function_name; the original must surface as
      # the touched unit's top neighbor (rank is the robust assertion —
      # absolute cosines are not).
      - name: Diff smoke test
        run: |
          cp .github/smoke/plant.rs src/smoke_plant.rs
          git add src/smoke_plant.rs   # git diff only sees tracked files
          out=$(target/release/semdup --db dogfood.sqlite diff --base HEAD)
          echo "$out"
          git rm -q --cached src/smoke_plant.rs && rm src/smoke_plant.rs
          echo "$out" | grep -A1 'smoke_plant\.rs' | grep -q 'src/extract\.rs.* c_function_name$' || {
            echo "expected c_function_name as the plant's top neighbor"; exit 1; }

      # Gate PRs on new duplicate relationships, without failing old debt
      # just because a PR touched nearby code.
      - name: Diff gate (PRs)
        if: github.event_name == 'pull_request'
        run: |
          git fetch --depth 1 origin "$BASE_REF"
          target/release/semdup --db dogfood.sqlite ci \
            --mode diff \
            --base "origin/$BASE_REF" \
            --refresh-base \
            --threshold "$DOGFOOD_THRESHOLD" \
            --policy new-pairs
        env:
          BASE_REF: ${{ github.base_ref }}
